# Generic training/test job spec for application_cloud_runner.py.
# The training app can live in any external git repo; pass it with --app-dir.
# Values can reference environment variables, e.g. ${PROJECT_ID}.
name: torch-train
project_id: ${PROJECT_ID}
region: ${REGION}
bucket: ${BUCKET_NAME}
artifact_repo: ${AR_REPO}
service_account: ${SA_EMAIL}

# Reusable runner image. Build/update this only when base image or requirements change:
#   ./deploy_runner_image.sh --spec cloud_runner.yaml --requirements /path/to/requirements.txt
image:
  name: acr-torch-runner
  tag: latest
  # or pin the full URI explicitly:
  # uri: us-central1-docker.pkg.dev/my-project/application-cloud-runner/acr-torch-runner:latest

# Used only by deploy_runner_image.py, not by per-run execution.
build:
  base_image: pytorch/pytorch:2.3.1-cuda12.1-cudnn8-runtime
  # requirements is resolved relative to this spec file unless absolute.
  requirements: requirements.txt
  apt_packages: []
  extra_pip: []

files:
  # Selected files are packed from --app-dir and uploaded to GCS for each run.
  include:
    - train.py
    - src/**
    - configs/**
    - pyproject.toml
    - requirements.txt
  required:
    - train.py
  exclude:
    - data/**
    - artifacts/**
    - checkpoints/**
    - '*.pt'
    - '*.pth'
  # Optional reproducibility guard. Use sha256:<hex> or <hex>.
  hashes: {}

source:
  # Source tarballs are temporary; the runner deletes them after successful runs unless --keep-source-upload is used.
  gcs_prefix: gs://${BUCKET_NAME}/acr-sources/torch-train

runtime:
  # The command runs inside the unpacked source folder at /workspace/app.
  command: ["python", "train.py"]
  workdir: /workspace/app

# Optional dataset staging. The cloud runner downloads this before runtime.command.
# It supports a GCS prefix/folder, a single object, or a tar/zip archive with unpack: auto.
dataset:
  uri: gs://${BUCKET_NAME}/datasets/example-dataset
  container_dir: /workspace/dataset
  unpack: auto

cloud_run:
  gpu: 1
  gpu_type: nvidia-l4
  cpu: 4
  memory: 16Gi
  tasks: 1
  parallelism: 1
  max_retries: 0
  task_timeout: 3600s

artifacts:
  # Container-side directory uploaded after the command exits, even on failure.
  container_dir: /workspace/artifacts
  # Cloud output prefix. The runner appends /<run_id>.
  gcs_prefix: gs://${BUCKET_NAME}/training-runs/torch-train
  # Optional local output dir. Usually overridden by --local-output-dir from the parent pipeline.
  local_dir: ./artifacts/latest

env:
  PYTHONUNBUFFERED: "1"
  WANDB_MODE: disabled
