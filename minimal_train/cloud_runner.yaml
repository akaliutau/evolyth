name: minimal-train
project_id: ${PROJECT_ID}
region: ${REGION}
bucket: ${BUCKET_NAME}
artifact_repo: ${AR_REPO}
service_account: ${SA_EMAIL}
image:
  name: acr-minimal-runner
  tag: latest
build:
  base_image: python:3.12-slim
  requirements: requirements.txt
files:
  include: ["train.py", "requirements.txt", "src/**"]
  required: ["train.py", "requirements.txt"]
source:
  gcs_prefix: gs://${BUCKET_NAME}/acr-sources/minimal-train
runtime:
  command: ["python", "train.py"]
  workdir: /workspace/app
# Optional; override with --dataset gs://bucket/path when needed.
# dataset:
#   uri: gs://${BUCKET_NAME}/datasets/minimal
#   container_dir: /workspace/dataset
#   unpack: auto
cloud_run:
  gpu: 1
  gpu_type: nvidia-l4
  cpu: 4
  memory: 16Gi
  tasks: 1
  parallelism: 1
  max_retries: 0
  task_timeout: 3600s
artifacts:
  container_dir: /workspace/artifacts
  gcs_prefix: gs://${BUCKET_NAME}/acr-runs/minimal-train
  local_dir: ./artifacts/minimal-train-latest
env:
  PYTHONUNBUFFERED: "1"
